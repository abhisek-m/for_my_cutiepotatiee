<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you be my girlfriend? 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff85a1;
    --pink-light: #ffc2d1;
    --pink-pale: #fff0f3;
    --pink-deep: #e05c7a;
    --white: #ffffff;
    --shadow: 0 8px 32px rgba(255,133,161,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f3 0%, #ffe4ed 40%, #ffd6e7 100%);
    font-family: 'Quicksand', sans-serif;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Sparkle canvas background ── */
  #sparkle-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    border: 2px solid rgba(255,194,209,0.6);
    box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.8);
    padding: clamp(2rem, 6vw, 3.5rem) clamp(1.5rem, 7vw, 4rem);
    max-width: min(480px, 92vw);
    width: 100%;
    text-align: center;
    animation: floatIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(40px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .hearts-top {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    line-height: 1;
    margin-bottom: 0.6rem;
    animation: heartbeat 1.4s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5.5vw, 2.2rem);
    color: #c94070;
    margin-bottom: 0.4rem;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: clamp(0.82rem, 2.8vw, 0.98rem);
    color: #e07090;
    margin-bottom: 1.8rem;
    font-weight: 600;
  }

  /* ── GIF area ── */
  .gif-area {
    height: clamp(140px, 35vw, 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.6rem;
    transition: all 0.4s ease;
  }

  .gif-area img {
    max-height: 100%;
    max-width: 100%;
    border-radius: 16px;
    object-fit: contain;
    animation: gifPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 20px rgba(255,100,130,0.18);
    transition: opacity 0.15s ease;
  }

  @keyframes gifPop {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── Buttons ── */
  .btn-row {
    display: flex;
    gap: clamp(0.8rem, 3vw, 1.4rem);
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
    min-height: 72px;
  }

  .btn {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    padding: 0.75em 2em;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    white-space: nowrap;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff85a1, #e0496a);
    color: #fff;
    box-shadow: 0 6px 20px rgba(224,73,106,0.38);
    animation: pulseYes 2s ease-in-out infinite;
  }

  @keyframes pulseYes {
    0%,100% { box-shadow: 0 6px 20px rgba(224,73,106,0.38); }
    50%      { box-shadow: 0 6px 36px rgba(224,73,106,0.62); }
  }

  .btn-yes:hover { transform: scale(1.07); }
  .btn-yes:active { transform: scale(0.96); }

  .btn-no {
    background: #fff;
    color: #c06080;
    border: 2px solid #ffc2d1;
    box-shadow: 0 4px 14px rgba(255,133,161,0.18);
    position: relative;
  }

  .btn-no:hover { background: #fff0f3; }
  .btn-no:active { transform: scale(0.96); }

  /* ── Yes screen ── */
  #yes-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    animation: floatIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  #yes-screen .big-emoji { font-size: clamp(2.5rem, 10vw, 4rem); }

  #yes-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 5.5vw, 2rem);
    color: #c94070;
    line-height: 1.2;
  }

  #yes-screen .yes-sub {
    font-size: clamp(0.88rem, 3vw, 1.05rem);
    color: #e07090;
    font-weight: 600;
  }

  #yes-screen img {
    max-width: min(240px, 75vw);
    border-radius: 20px;
    box-shadow: 0 6px 28px rgba(255,100,130,0.22);
    animation: gifPop 0.5s ease both;
  }

  /* ── Confetti canvas ── */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="card" id="main-card">
  <!-- Question screen -->
  <div id="question-screen">
    <div class="hearts-top">💖✨💖</div>
    <h1>Will you be my girlfriend? 💖</h1>
    <p class="subtitle">Think carefully… 🌸</p>

    <div class="gif-area" id="gif-area">
      <img id="main-gif" src="https://media.tenor.com/8DMJ2D8tOXYAAAAC/propose-love.gif" alt="proposing" onerror="this.src='https://media.tenor.com/nz_OEj0HRDMAAAAC/cute-love.gif'" />
    </div>

    <div class="btn-row" id="btn-row">
      <button class="btn btn-yes" id="btn-yes" onclick="handleYes()">Yes 😍</button>
      <button class="btn btn-no"  id="btn-no"  onclick="handleNo()">No 😢</button>
    </div>
  </div>

  <!-- Yes screen -->
  <div id="yes-screen">
    <div class="big-emoji">🎉❤️🎉</div>
    <h2>HURRAY! You said YES! 🥳</h2>
    <img id="yes-gif" src="https://media.tenor.com/nFbBKfECBZgAAAAC/love-hug.gif" alt="love hug" />
    <p class="yes-sub">You just made me the happiest person 🥹</p>
    <p class="yes-sub">My heart is yours forever 💕</p>
  </div>
</div>

// ─────────────────────────────────────────────
// SPARKLE BACKGROUND
// ─────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('sparkle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, sparks = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Spark() {
    this.reset = function() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.r = Math.random() * 2 + 0.5;
      this.alpha = Math.random();
      this.speed = Math.random() * 0.012 + 0.006;
      this.phase = Math.random() * Math.PI * 2;
      this.drift = (Math.random() - 0.5) * 0.3;
    };
    this.reset();
  }

  for (let i = 0; i < 130; i++) sparks.push(new Spark());

  function draw() {
    ctx.clearRect(0, 0, W, H);
    sparks.forEach(s => {
      s.phase += s.speed;
      s.x += s.drift;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;
      const a = (Math.sin(s.phase) + 1) / 2;
      ctx.save();
      ctx.globalAlpha = a * 0.75;
      // 4-pointed star
      ctx.fillStyle = `hsl(${330 + Math.sin(s.phase)*30}, 90%, ${70 + a * 20}%)`;
      drawStar(ctx, s.x, s.y, 4, s.r * 2.5, s.r * 0.8);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }

  function drawStar(ctx, cx, cy, spikes, outer, inner) {
    let rot = (Math.PI / 2) * 3;
    const step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(cx, cy - outer);
    for (let i = 0; i < spikes; i++) {
      ctx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer);
      rot += step;
      ctx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner);
      rot += step;
    }
    ctx.lineTo(cx, cy - outer);
    ctx.closePath();
    ctx.fill();
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

let noCount = 0;
let noScale = 1;
let escaping = false;

const btnNo    = document.getElementById('btn-no');
const btnRow   = document.getElementById('btn-row');
const mainGif  = document.getElementById('main-gif');

function handleNo() {
  noCount++;

  // Change text
  if (noCount < noTexts.length) {
    btnNo.textContent = noTexts[noCount];
  }

  // Swap GIF — sad gif from very first No click
  const gifIndex = Math.min(noCount - 1, sadGifs.length - 1);
  mainGif.style.opacity = '0';
  setTimeout(() => {
    mainGif.src = sadGifs[gifIndex];
    mainGif.style.animation = 'none';
    void mainGif.offsetWidth;
    mainGif.style.animation = 'gifPop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    mainGif.style.opacity = '1';
  }, 150);

  // Shrink button
  noScale = Math.max(0.55, noScale - 0.09);
  btnNo.style.transform = `scale(${noScale})`;

  // After 5 clicks → escape mode
  if (noCount >= 5 && !escaping) {
    escaping = true;
    activateEscape();
  }
}

function activateEscape() {
  const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;

  if (isMobile) {
    // Mobile: jump on touch
    btnNo.addEventListener('touchstart', escapeMobile, { passive: true });
  } else {
    // Desktop: flee on mouse proximity
    document.addEventListener('mousemove', escapeDesktop);
  }
}

function getRandomPos() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const bw = btnNo.offsetWidth;
  const bh = btnNo.offsetHeight;
  const margin = 20;
  const x = margin + Math.random() * (vw - bw - margin * 2);
  const y = margin + Math.random() * (vh - bh - margin * 2);
  return { x, y };
}

function teleportBtn() {
  const { x, y } = getRandomPos();
  btnNo.style.position = 'fixed';
  btnNo.style.left = x + 'px';
  btnNo.style.top  = y + 'px';
  btnNo.style.zIndex = 100;
  btnNo.style.transition = 'left 0.25s ease, top 0.25s ease';
  // Remove from btn-row flow
  if (!document.body.contains(btnNo) || btnNo.parentNode !== document.body) {
    document.body.appendChild(btnNo);
  }
}

function escapeMobile(e) {
  e.preventDefault();
  teleportBtn();
}

function escapeDesktop(e) {
  const rect = btnNo.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 120) {
    teleportBtn();
  }
}

// ─────────────────────────────────────────────
// YES BUTTON
// ─────────────────────────────────────────────
function handleYes() {
  document.getElementById('question-screen').style.display = 'none';
  const ys = document.getElementById('yes-screen');
  ys.style.display = 'flex';
  // Clean up escape listeners
  document.removeEventListener('mousemove', escapeDesktop);
  // Remove the escaped No button if it's floating
  if (btnNo.parentNode === document.body) btnNo.remove();
  // Fire confetti
  launchConfetti();
}

// ─────────────────────────────────────────────
// CONFETTI
// ─────────────────────────────────────────────
(function() {
  const canvas  = document.getElementById('confetti-canvas');
  const ctx     = canvas.getContext('2d');
  let pieces    = [];
  let running   = false;
  let animId;

  const COLORS = [
    '#ff85a1','#ffb3c1','#ffd6e7','#ff4d6d',
    '#ff99b4','#ffc8dd','#ffafcc','#ffe4ed',
    '#f72585','#b5179e','#c77dff','#ffd700'
  ];

  function Piece() {
    this.reset = function() {
      this.x  = Math.random() * canvas.width;
      this.y  = -10;
      this.w  = Math.random() * 10 + 5;
      this.h  = Math.random() * 6  + 3;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.angle = Math.random() * 360;
      this.spin  = (Math.random() - 0.5) * 8;
      this.vx = (Math.random() - 0.5) * 4;
      this.vy = Math.random() * 4 + 2;
      this.alpha = 1;
    };
    this.reset();
  }

  window.launchConfetti = function() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    pieces = [];
    for (let i = 0; i < 200; i++) {
      const p = new Piece();
      p.y = -Math.random() * canvas.height * 0.5; // stagger entry
      pieces.push(p);
    }
    if (!running) { running = true; animateConf(); }
    // Stop after 5s
    setTimeout(() => { running = false; cancelAnimationFrame(animId); ctx.clearRect(0,0,canvas.width,canvas.height); }, 5000);
  };

  function animateConf() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x     += p.vx;
      p.y     += p.vy;
      p.angle += p.spin;
      if (p.y > canvas.height * 0.8) p.alpha -= 0.015;
      if (p.alpha <= 0 || p.y > canvas.height + 20) p.reset();
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    animId = requestAnimationFrame(animateConf);
  }
})();
</script>
